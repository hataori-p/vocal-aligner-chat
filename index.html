<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocalAlignerGUI Support</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #1e1e2e; color: #cdd6f4; display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 100%; max-width: 600px; background: #313244; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; height: 85vh; }
        #chat-history { padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 18px; border-radius: 8px; max-width: 85%; word-wrap: break-word; line-height: 1.4; }
        .user-msg { background: #89b4fa; color: #11111b; align-self: flex-end; border-bottom-right-radius: 0; }
        .ai-msg { background: #45475a; color: #cdd6f4; align-self: flex-start; border-bottom-left-radius: 0; }
        
        #input-container { background: #1e1e2e; border-top: 1px solid #45475a; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Keeps the widget technically visible to the browser, but hidden from user */
        #turnstile-widget { position: absolute; opacity: 0; pointer-events: none; }
        
        #input-area { display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 12px; border: 1px solid #45475a; border-radius: 5px; background: #313244; color: white; outline: none; }
        input[type="text"]:focus { border-color: #89b4fa; }
        input[type="text"]:disabled { opacity: 0.6; cursor: not-allowed; }
        
        button { padding: 12px 20px; background: #a6e3a1; color: #11111b; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; white-space: nowrap; }
        #send-btn:hover { background: #94e289; }
        button:disabled { background: #585b70; cursor: not-allowed; }
        #clear-btn { background-color: #f38ba8; padding: 12px 15px; }
        #clear-btn:hover { background-color: #eba0ac; }
        
        #privacy-note { padding: 8px 15px; text-align: center; font-size: 0.75em; color: #a6adc8; background-color: #1e1e2e; margin: 0;}
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-history">
        <div class="message ai-msg">Hello! I am the technical assistant for <strong>VocalAlignerGUI</strong>. How can I help you today?</div>
    </div>
    
    <div id="input-container">
        <!-- 2. EMPTY CONTAINER FOR WIDGET (Rendered via JS) -->
        <div id="turnstile-widget"></div>
        
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Ask a question about VocalAlignerGUI...">
            <button id="send-btn">Send</button>
            <button id="clear-btn" title="Clear Chat">🗑️</button>
        </div>
    </div>
    
    <div id="privacy-note">
        <strong>Privacy Note:</strong> Messages are sent to OpenRouter for processing. Do not send private or sensitive information.
    </div>
</div>

<script>
    // Configuration
    const WORKER_URL = "https://vocal-aligner-chat.hataori.workers.dev"; 
    const SITE_KEY = "0x4AAAAAACiAiEmo3_WVLol_"; 

    // State
    let chatHistory = [];
    let widgetId = null; 

    // 2. TURNSTILE LOADER
    window.onTurnstileLoad = function () {
        console.log("Turnstile API loaded. Initializing...");
        
        // We use a tiny delay to ensure the div #turnstile-widget is in the DOM
        setTimeout(() => {
            const widgetDiv = document.getElementById('turnstile-widget');
            if (!widgetDiv) {
                console.error("Error: Widget container not found.");
                return;
            }
            
            widgetId = turnstile.render('#turnstile-widget', {
                sitekey: SITE_KEY,
                callback: handleTurnstileToken, // Success function
                execution: 'execute',          // MANUAL mode (No focus theft on load)
                appearance: 'interaction-only' 
            });
            console.log("Widget rendered with ID:", widgetId);
        }, 100);
    };
    
    // 3. HANDLE SUCCESSFUL TOKEN
    async function handleTurnstileToken(token) {
        console.log("Security check passed. Sending...");
        
        const inputEl = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const text = inputEl.value.trim();

        addMessage('user', text);
        chatHistory.push({ role: "user", content: text });
        
        inputEl.value = '';
        inputEl.disabled = true;
        sendBtn.disabled = true;
        clearBtn.disabled = true;
        sendBtn.innerText = "Thinking...";

        try {
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-App-Secret-Header": "VocalAlignerSecureChat"
                },
                body: JSON.stringify({
                    messages: chatHistory,
                    turnstileToken: token
                })
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(errText);
            }
            
            const data = await response.json();
            const aiText = data.choices[0].message.content;
            
            addMessage('assistant', aiText);
            chatHistory.push({ role: "assistant", content: aiText });

        } catch (error) {
            console.error(error);
            addMessage('assistant', `❌ Connection Error: ${error.message}`);
            chatHistory.pop(); 
        } finally {
            // RESTORE UI
            sendBtn.innerText = "Send";
            inputEl.disabled = false;
            sendBtn.disabled = false;
            clearBtn.disabled = false;
            
            // RESET WIDGET
            if (widgetId !== null) turnstile.reset(widgetId);
            
            // FORCE FOCUS BACK
            setTimeout(() => inputEl.focus(), 100);
        }
    }

    // Helper Functions
    function addMessage(role, text) {
        const historyEl = document.getElementById('chat-history');
        const div = document.createElement('div');
        div.className = `message ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
        div.innerHTML = text.replace(/\n/g, '<br>'); 
        historyEl.appendChild(div);
        historyEl.scrollTop = historyEl.scrollHeight;
    }

    function clearChat() {
        chatHistory = [];
        document.getElementById('chat-history').innerHTML = '<div class="message ai-msg">Chat cleared. How else can I help?</div>';
        if (widgetId !== null) turnstile.reset(widgetId);
        document.getElementById('user-input').focus();
    }

    function handleSendClick() {
        const inputEl = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const text = inputEl.value.trim();

        if (!text) return;

        // Trigger the Invisible Security Check
        if (widgetId !== null) {
            turnstile.execute(widgetId);
        } else {
            alert("Security widget loading... please wait 2 seconds.");
        }
    }

    // Event Listeners (Run when DOM is ready)
    window.addEventListener('DOMContentLoaded', () => {
        const inputEl = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');

        sendBtn.addEventListener('click', handleSendClick);
        clearBtn.addEventListener('click', clearChat);
        
        inputEl.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !sendBtn.disabled) handleSendClick();
        });
        
        inputEl.focus();
    });

</script>

<!-- 4. LOAD CLOUDFLARE SCRIPT (With Correct ONLOAD parameter) -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad&render=explicit" async defer></script>

</body>
</html>
